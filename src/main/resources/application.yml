server_domain:
  http://localhost:8080

front_domain:
  http://localhost:5173

spring:
  application:
    name: Demo
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 3
  jpa:
    properties:
      hibernate:
        show_sql: true
    hibernate:
      ddl-auto: update

token:
  SECRET_KEY: ${SECRET_KEY}
  ACCESS_EXPIRATION_SECOND: 3600000 # 1시간
  REFRESH_EXPIRATION_SECOND: 922337203685477580 # test 환경 무한대

oauth:
  google:
    client-id: ${GOOGLE_ID}
    client-secret: ${GOOGLE_SECRET}
    redirect-uri: ${front_domain}/oauth/callback/google
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
  kakao:
    client-id: ${KAKAO_ID}
    client-secret: ${KAKAO_SECRET}
    redirect-uri: ${front_domain}/oauth/callback/kakao
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
  naver:
    client-id: ${NAVER_ID}
    client-secret: ${NAVER_SECRET}
    redirect-uri: ${front_domain}/oauth/callback/naver
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me

external:
  airlabs:
    base-url: https://airlabs.co/api/v9
    api-key: ${AIRLABS_API_KEY}